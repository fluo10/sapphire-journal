name: Release VSCode Extension

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  prepare:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/vscode/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      cli_version: ${{ steps.cli_version.outputs.cli_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/vscode/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract CLI version from package.json
        id: cli_version
        run: |
          CLI_VERSION=$(node -p "require('./sapphire-journal-vscode/package.json').sapphireJournalVersion")
          echo "cli_version=$CLI_VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag vscode-v${{ steps.version.outputs.version }}
          git push origin vscode-v${{ steps.version.outputs.version }}

  vsix:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            vsce_target: linux-x64
            artifact: sajo-linux-x86_64
          - os: ubuntu-24.04-arm
            vsce_target: linux-arm64
            artifact: sajo-linux-aarch64
          - os: macos-latest
            vsce_target: darwin-arm64
            artifact: sajo-macos-aarch64
          - os: windows-latest
            vsce_target: win32-x64
            artifact: sajo-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: sapphire-journal-vscode/package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sapphire-journal-vscode

      - name: Download CLI binary from GitHub Releases
        shell: bash
        run: |
          gh release download "cli-v${{ needs.prepare.outputs.cli_version }}" \
            --pattern "${{ matrix.artifact }}" \
            --dir sapphire-journal-vscode/bin/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename binary to sajo (Unix)
        if: runner.os != 'Windows'
        run: |
          mv sapphire-journal-vscode/bin/${{ matrix.artifact }} sapphire-journal-vscode/bin/sajo
          chmod +x sapphire-journal-vscode/bin/sajo

      - name: Rename binary to sajo.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item sapphire-journal-vscode/bin/${{ matrix.artifact }} sajo.exe

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.vsce_target }} --no-dependencies
        working-directory: sapphire-journal-vscode

      - uses: actions/upload-artifact@v4
        with:
          name: sapphire-journal-vscode-${{ matrix.vsce_target }}.vsix
          path: sapphire-journal-vscode/*.vsix

  release:
    needs: [prepare, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: vscode-v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/*

  publish:
    needs: [prepare, vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          pattern: sapphire-journal-vscode-*.vsix

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in artifacts/*.vsix; do
            npx @vscode/vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: |
          for vsix in artifacts/*.vsix; do
            npx ovsx publish "$vsix" -p ${{ secrets.OVSX_PAT }}
          done
