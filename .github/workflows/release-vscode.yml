name: Release VSCode Extension

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  prepare:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/vscode/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/vscode/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag vscode-v${{ steps.version.outputs.version }}
          git push origin vscode-v${{ steps.version.outputs.version }}

  vsix:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            vsce_target: linux-x64
            binary: sajo
          - os: ubuntu-24.04-arm
            vsce_target: linux-arm64
            binary: sajo
          - os: macos-latest
            vsce_target: darwin-arm64
            binary: sajo
          - os: windows-latest
            vsce_target: win32-x64
            binary: sajo.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: sapphire-journal-vscode/package.json

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sapphire-journal-vscode

      - name: Build CLI binary
        run: cargo build --release -p sapphire-journal

      - name: Stage CLI binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p sapphire-journal-vscode/bin
          cp target/release/${{ matrix.binary }} sapphire-journal-vscode/bin/sajo
          chmod +x sapphire-journal-vscode/bin/sajo

      - name: Stage CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path sapphire-journal-vscode/bin | Out-Null
          Copy-Item target/release/${{ matrix.binary }} sapphire-journal-vscode/bin/sajo.exe

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.vsce_target }} --no-dependencies
        working-directory: sapphire-journal-vscode

      - uses: actions/upload-artifact@v7
        with:
          name: sapphire-journal-vscode-${{ matrix.vsce_target }}.vsix
          path: sapphire-journal-vscode/*.vsix

  release:
    needs: [prepare, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: vscode-v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/*

  publish:
    needs: [prepare, vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
          pattern: sapphire-journal-vscode-*.vsix

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in artifacts/*.vsix; do
            echo "Publishing $vsix to VS Code Marketplace..."
            output=$(npx @vscode/vsce publish --packagePath "$vsix" 2>&1)
            rc=$?
            echo "$output"
            if [ $rc -ne 0 ] && ! echo "$output" | grep -qi "already"; then
              exit $rc
            fi
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: |
          for vsix in artifacts/*.vsix; do
            echo "Publishing $vsix to Open VSX Registry..."
            output=$(npx ovsx publish "$vsix" -p ${{ secrets.OVSX_PAT }} 2>&1)
            rc=$?
            echo "$output"
            if [ $rc -ne 0 ] && ! echo "$output" | grep -qi "already"; then
              exit $rc
            fi
          done
