name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  prepare:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: archelon
            asset_name: archelon-linux-x86_64
          - os: macos-latest
            binary: archelon
            asset_name: archelon-macos-aarch64
          - os: windows-latest
            binary: archelon.exe
            asset_name: archelon-windows-x86_64.exe
          - os: ubuntu-24.04-arm
            binary: archelon
            asset_name: archelon-linux-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p archelon

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  vsix:
    needs: [prepare, build]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            vsce_target: linux-x64
            artifact: archelon-linux-x86_64
          - os: ubuntu-24.04-arm
            vsce_target: linux-arm64
            artifact: archelon-linux-aarch64
          - os: macos-latest
            vsce_target: darwin-arm64
            artifact: archelon-macos-aarch64
          - os: windows-latest
            vsce_target: win32-x64
            artifact: archelon-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: archelon-vscode

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: archelon-vscode/bin/

      - name: Rename binary to archelon (Unix)
        if: runner.os != 'Windows'
        run: |
          mv archelon-vscode/bin/${{ matrix.artifact }} archelon-vscode/bin/archelon
          chmod +x archelon-vscode/bin/archelon

      - name: Rename binary to archelon.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item archelon-vscode/bin/${{ matrix.artifact }} archelon.exe

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.vsce_target }}
        working-directory: archelon-vscode

      - uses: actions/upload-artifact@v4
        with:
          name: archelon-vscode-${{ matrix.vsce_target }}.vsix
          path: archelon-vscode/*.vsix

  release:
    needs: [prepare, build, vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/*

  publish:
    needs: [prepare, vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          pattern: archelon-vscode-*.vsix

      - name: Publish to VS Code Marketplace
        run: |
          for vsix in artifacts/*.vsix; do
            npx @vscode/vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: |
          for vsix in artifacts/*.vsix; do
            npx ovsx publish "$vsix" -p ${{ secrets.OVSX_PAT }}
          done
